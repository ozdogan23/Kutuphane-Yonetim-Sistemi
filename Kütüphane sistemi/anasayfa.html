    <script>
        var mainimg = document.querySelector('.slider img');
        var images = ['img/kütüphane6.jpg', 'img/kütüphane2.jpg', 'img/kütüphane5.jpg', 'img/kütüphane4.webp'];
        var num = 0;
        const auto = true;
        const intervalTime = 5000;
        let slideInterval;
        function next() {
            num++;
            if (num >= images.length) {
                num = 0;
            }
            mainimg.src = images[num];
        }
        function back() {
            num--;
            if (num < 0) {
                num = images.length - 1;
            }
            mainimg.src = images[num];
        }
        if (auto) {
            slideInterval = setInterval(next, intervalTime);
        }
    </script>
