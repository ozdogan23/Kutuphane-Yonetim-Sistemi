        body {
            background-image: linear-gradient(90deg, #DFD0B8, #3C5B6F);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 900px;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #153448;
            border-radius: 100px;
            padding: 0;
            margin-top: 10px;
            margin-left: 20px;
            margin-right: 20px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            margin-left: 60px;
            margin-top: 5px;
        }
        .logo img {
            height: 100px;
            width: auto;
            border-radius: 50%;
        }
        .search {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .btn {
            background-color: #fff;
            border: none;
            cursor: pointer;
            padding-left: 200px;
            padding-right: 200px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 7px;
            margin-left: 10px;
            margin-top: -30px;
            list-style-type: none;
            font-size: medium;
        }
        .navbar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: -40px;
            margin-bottom: 5px;
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .navbar ul li {
            margin-right: 20px;
            position: relative;
        }
        .navbar ul li a {
            text-decoration: none;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            display: block;
        }
        .navbar ul li ul {
            display: none;
            position: absolute;
            background-color: #153448;
            border-radius: 0 0 5px 5px;
            padding: 0;
            margin-top: 5px;
            width: max-content;
            z-index: 1;
        }
        .navbar ul li:hover ul {
            display: block;
        }
        .navbar ul li ul li {
            margin-right: 0;
        }
        .navbar ul li ul li a {
            padding: 10px;
            border-radius: 0;
            display: block;
        }
        .navbar ul li a:hover,
        .navbar ul li ul li a:hover {
            background-color: #f39c12;
        }
        .button-container{
            background:white;
            padding: 5px 50px ;
            text-decoration: none;
            border:2px ;
            font-weight:none;
            margin-top: 40px;
            margin-bottom:60px;
            margin-left: 60px;
            margin-right: 60px;
            border-radius: 10px;
            transition: .2s;
        }
        blue-button:hover{
            background:white;
        }
        .blue-button{
            background: white;
            border:3px solid white ;
            cursor: pointer;
            color:black;
            font-size: 12px;
        }
        .table{
            background-color: white;
            text-align: center;
            margin-top: 30px;
            margin-left: 300px;
            border-radius: 50px;
            padding-bottom: 30px;
            padding-top: 20px;
        }
        .social{
            padding-left: 50px;
            padding-right: 50px;
            padding-top: 20px;
            padding-bottom: 20px;
        }
        h1{
            text-align: center;
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .title{
            padding: 10px 20px 10px 20px;
        }
        .telefon{
            padding: 20px;
        }
        .eposta{
            padding: 20px;
        }
    </style>
